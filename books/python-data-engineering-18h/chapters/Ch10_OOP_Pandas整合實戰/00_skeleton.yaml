# Ch10 skeleton — SOP §4.1
# OOP × Pandas 整合實戰（M4 視覺化與整合實戰 · 1.5 hr · 最終收斂章）

chapter: Ch10
title: OOP × Pandas 整合實戰
module: M4 視覺化與整合實戰
time_min: 90
n_content: 17
governing_thought: >
  十章到這裡，要做的不是再學一個新 API，
  是把前九章每一項能力擰成一條可執行、可擴充、可交付的資料管線 ——
  DataCleaner 是這門課最後的「一個類別」，也是你下一份工作的第一個 commit。

arc:
  - phase: 開場（SILENT/ASK）
    slides: [S1, S2]
    intent: 收斂章的第一口氣 — 不是學新東西、是把舊東西組成一台車。
  - phase: 10-1 需求分析與類別設計
    slides: [S3, S4, S5, S6]
    intent: 從情境拆出「狀態 vs 動作」，設計 DataCleaner 介面與自訂 Exception。
  - phase: 10-2 完整實作 Walkthrough（逐段對應前 9 章）
    slides: [S7, S8, S9, S10, S11, S12, S13]
    intent: DataCleaner 六段逐行走 — 每一段對應一個章節能力的「回收」。
  - phase: 10-3 課程總結與下一步學習路徑
    slides: [S14, S15, S16, S17]
    intent: 能力盤點（五軸） + 五條學習路徑 + 三句 Linus 忠告 + 結業 SILENT。

slides:
  - id: S1
    type: SILENT
    thesis: "這一章不教新語法。\n這一章把你學過的九章，組成一台車。"
  - id: S2
    type: ASK
    question: "如果今天就被要求交出一個『可以跑』的資料管線，\n你會從 import pandas 開始，還是從 class 開始？"
    data_card:
      label: 2025 業界 Code Review 觀察
      stat: "2 種"
      caption: 「腳本型」30 行搞定，「管線型」可重用可擴充 — 新人與資深的分水嶺就這一題

  - id: S3
    type: MATRIX-2x2
    title: "狀態 vs 動作：DataCleaner 的職責拆分"
  - id: S4
    type: IMAGE-CODE
    title: "DataCleaner 介面草圖：六個方法、一條鏈"
    image_id: Ch10_S04_datacleaner_flow
  - id: S5
    type: CODE
    title: "自訂 Exception：DataValidationError（呼應 Ch6）"
  - id: S6
    type: SILENT
    thesis: "好介面的特徵：\n看名字就知道能做什麼、看型別就知道能怎麼串。"

  - id: S7
    type: CODE
    title: "__init__：fail fast + pathlib（呼應 Ch4 + Ch6）"
  - id: S8
    type: CODE
    title: "validate：自訂 Exception 在真實管線長這樣（呼應 Ch6）"
  - id: S9
    type: CODE
    title: "clean_missing_values：dropna / fillna 策略參數化（呼應 Ch8）"
  - id: S10
    type: CODE
    title: "apply_custom_transform：lambda 找到主場（呼應 Ch3 + Ch8）"
  - id: S11
    type: IMAGE-CODE
    title: "generate_eda_report：把 Matplotlib 包進類別（呼應 Ch9）"
    image_id: Ch10_S11_method_chaining
  - id: S12
    type: CODE
    title: "export_data + 完整 Method Chaining（呼應 Ch5）"
  - id: S13
    type: TABLE
    title: "可改進方向：logging / from_config / 單元測試（作業指引）"

  - id: S14
    type: PYRAMID
    title: "18 小時能力盤點：系統直覺 × Python × OOP × 資料工程 × 視覺化"
  - id: S15
    type: IMAGE-TABLE
    title: "下一站：五條路線（SQL / sklearn / Polars+DuckDB / Airflow / 雲端）"
    image_id: Ch10_S15_learning_ecosystem
  - id: S16
    type: VS-LIST
    title: "Linus 三句結業忠告：給三個月後的自己"
  - id: S17
    type: SILENT
    thesis: "18 小時結束了。\n從現在起，程式碼是寫給三個月後的自己看的。"

image_placeholders:
  - id: Ch10_S04_datacleaner_flow
    slot_name: DataCleaner 類別結構圖
    description: 中央為 DataCleaner 類別方塊（列出六個方法），周圍放 CSV 輸入、乾淨資料輸出、EDA PNG 輸出，箭頭說明 Method Chaining 流向
    recommended_size: 1400×800 px
  - id: Ch10_S11_method_chaining
    slot_name: Method Chaining 視覺化
    description: 六個圓角矩形水平連成一條鏈（__init__ → validate → clean → apply → eda → export），每個方塊下方標「return self」，整條鏈末端標註「一條 pipeline」
    recommended_size: 1600×600 px
  - id: Ch10_S15_learning_ecosystem
    slot_name: 五條學習路徑生態圖
    description: 中央為「你現在的位置（DataCleaner）」，五條放射狀箭頭分別指向 SQL/SQLAlchemy、scikit-learn、Polars+DuckDB、Airflow/Prefect、AWS/GCP，每條線上標註 1 句話定位
    recommended_size: 1600×1000 px
