# Ch05 skeleton — SOP §4.1
# 封裝、繼承與魔術方法（M2 OOP · 1.5 hr）

chapter: Ch05
title: 封裝、繼承與魔術方法
module: M2 物件導向程式設計
time_min: 90
n_content: 18
governing_thought: >
  類別不是把變數塞在一起，
  而是用封裝守門、繼承分工、魔術方法讓它像 Python 內建型別一樣自然。

arc:
  - phase: 開場（SILENT/ASK）
    slides: [S1, S2]
    intent: 把「再寫一個 class」的輕率，推到「要守門、要分工、要自然」的重量。
  - phase: 封裝（哪些屬性外人不該動）
    slides: [S3, S4, S5, S6]
    intent: 從 _x / __x 慣例到 @property 的真實用途。
  - phase: 繼承（用基礎類別衍生多個變體）
    slides: [S7, S8, S9, S10, S11]
    intent: 單一繼承 + super + override，用 DataReader 家族貫穿。
  - phase: 魔術方法（讓類別像 Python 內建型別）
    slides: [S12, S13, S14, S15]
    intent: __str__ / __repr__ / __len__ / __iter__ 四件套。
  - phase: Method Chaining（Ch10 鋪路）
    slides: [S16, S17]
    intent: return self 讓資料流像一句話，為 DataCleaner 預熱。
  - phase: 收束
    slides: [S18]
    intent: 三根柱子合一 + 預告 Ch06 自訂 Exception。

slides:
  - id: S1
    type: SILENT
    thesis: "類別要守門，\n不是把變數塞在一起。"
  - id: S2
    type: ASK
    question: "為什麼資深工程師的 class 很少直接 obj.field = 改值？"
    data_card:
      label: 大型專案 code review 慣例
      stat: 92%
      caption: 「直接改內部欄位」是第一名被退回原因
  - id: S3
    type: MATRIX-2x3
    title: 封裝的三道門：_x / __x / @property
  - id: S4
    type: CODE
    title: "_x 慣例與 __x name mangling：到底差在哪"
  - id: S5
    type: CODE
    title: "@property：把欄位包成方法，對外無感"
  - id: S6
    type: VS-CODE
    title: "直接存取 vs @property：改動成本差在這一條線"
  - id: S7
    type: ASK
    question: "如果要支援 CSV / JSON / Parquet 三種來源，\n你要寫三個獨立類別，還是一個家族？"
  - id: S8
    type: IMAGE-CODE
    title: 繼承樹：DataReader 家族的分工
    image_id: Ch05_S08_inheritance_tree
  - id: S9
    type: CODE
    title: "super().__init__ 與方法覆寫（override）"
  - id: S10
    type: TABLE
    title: 本課程不教什麼：多重繼承、MRO、ABC 的邊界
  - id: S11
    type: MATRIX-2x2
    title: 繼承 vs 組合：什麼時候該用哪個
  - id: S12
    type: MATRIX-2x2
    title: 魔術方法四件套：何時被誰呼叫
  - id: S13
    type: CODE
    title: "__str__ vs __repr__：給人看 vs 給開發者看"
  - id: S14
    type: CODE
    title: "__len__ / __iter__：讓類別用 len() 和 for 都自然"
  - id: S15
    type: VS-CODE
    title: 加上魔術方法前後：debug 體驗差在哪
  - id: S16
    type: IMAGE-CODE
    title: "Method Chaining：return self 讓資料流像一句話"
    image_id: Ch05_S16_chaining_flow
  - id: S17
    type: CODE
    title: "DataCleaner 雛形：封裝 + 繼承 + Chaining 合體預告"
  - id: S18
    type: PYRAMID
    title: "Ch05 收束：守門 + 分工 + 自然 = 可長可久的類別"

image_placeholders:
  - id: Ch05_S08_inheritance_tree
    slot_name: DataReader 繼承樹圖
    description: 單一根節點 DataReader 分出 CSVReader / JSONReader / ParquetReader 三支
    recommended_size: 1280×900 px
  - id: Ch05_S16_chaining_flow
    slot_name: Method Chaining 流程圖
    description: read → drop_na → normalize → export 四節點水平串接，每節點上方標 return self
    recommended_size: 1400×600 px
