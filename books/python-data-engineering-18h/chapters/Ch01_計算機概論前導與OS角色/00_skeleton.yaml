module: Ch01
title: "計算機概論前導與 OS 角色"
governing_thought: "本章不是教硬體組裝，而是建立『資料從哪裡來、在哪裡運算、存到哪裡去』的宏觀心智模型——後面所有效能議題都會回頭參照這張地圖。"
target_time_minutes: 90
audience: "企業內訓 / 付費技術課程 / 成人學員（數據工程 18h 主線）"
style: Editorial-strict
primary_color: "#1B5E3F"

narrative_arc:
  hook: [1, 2]
  tension: [3, 7, 11]
  reveal: [4, 5, 6, 8, 9, 10]
  ground: [12, 13, 14, 15]
  feel: [16, 17]

slides:
  - index: 1
    prototype: SILENT
    thesis: "你寫的每一行 Python，都是向 OS 借硬體的一張申請單。"
    data_hook: null
    needs_real_image: false

  - index: 2
    prototype: ASK
    thesis: "為什麼同一份 CSV，pandas 讀 3 秒、純 Python 要讀 40 秒？"
    data_hook: "1,000 萬列 × 6 欄 CSV 載入基準：pandas 3.1s vs 純 Python csv.reader 41.7s（單機 i7/32G/SSD）"
    needs_real_image: false

  - index: 3
    prototype: FLOW
    thesis: "程式語言三代演進：從機器碼到高階語言，抽象層層往上，效能層層交換。"
    data_hook: "三代：機器碼(1940s) → 組合語言(1950s) → 高階語言(1960s-)"
    needs_real_image: false

  - index: 4
    prototype: VS
    thesis: "編譯 vs 直譯：一個犧牲啟動時間換執行速度，一個犧牲執行速度換開發速度。"
    data_hook: "C/Rust 編譯 vs Python/JS 直譯；Python 數據套件的 C 後端比例 ≥ 70%（NumPy/pandas/PyTorch）"
    needs_real_image: false

  - index: 5
    prototype: MATRIX
    thesis: "Python 是黏合語言：高階語法在上、C 核心在下，這就是為什麼 NumPy 比純 Python 快 10–100 倍。"
    data_hook: "純 Python 百萬次加總 vs NumPy 向量化：約 120x 加速（CPython 3.11 / NumPy 1.26）"
    needs_real_image: false

  - index: 6
    prototype: MATRIX
    thesis: "Bit 是 0/1 的電位，Byte 是 8 個 Bit——所有『資料量』最終都要換算成這兩個單位。"
    data_hook: "1 Byte = 8 Bit；KB → MB → GB → TB → PB，每級 1024 倍"
    needs_real_image: false

  - index: 7
    prototype: CHART
    thesis: "1 億筆 × float64 ≈ 800 MB——這個量級感是你選工具前必須有的直覺。"
    data_hook: "float64 = 8 Bytes；1e8 × 8 = 8e8 Bytes ≈ 763 MiB ≈ 800 MB。對照 8 GB 記憶體：10 個這樣的陣列就 OOM"
    needs_real_image: false

  - index: 8
    prototype: PHOTO
    thesis: "馮紐曼架構：CPU 運算、Memory 暫存、I/O 進出——80 年不變的三分法。"
    data_hook: "von Neumann 1945 架構圖；CPU / RAM / I/O 三區分工"
    needs_real_image: true

  - index: 9
    prototype: VS
    thesis: "CPU 是少數強者、GPU 是多數平庸者——矩陣運算之所以走 GPU，是因為它能被切成上千份平行做。"
    data_hook: "典型 CPU 8-16 核、GPU 數千 CUDA 核；FP32 吞吐量差距 10-50 倍（H100 vs Xeon）"
    needs_real_image: true

  - index: 10
    prototype: FLOW
    thesis: "儲存金字塔：Register → Cache → RAM → SSD → HDD，上層快 1000 倍、容量小 1000 倍。"
    data_hook: "L1 ~1ns / RAM ~100ns / SSD ~100µs / HDD ~10ms；相差 10^7"
    needs_real_image: false

  - index: 11
    prototype: ASK
    thesis: "你的 Python 程式從來不能直接摸硬體——所有請求都要經過 OS 這位守門人。"
    data_hook: "System Call：open / read / mmap / fork；Python 每次 open() 背後都是一次 syscall"
    needs_real_image: false

  - index: 12
    prototype: PYRAMID
    thesis: "OS 三大職責：記憶體管理、檔案系統、行程排程——數據工程的三座隱形山。"
    data_hook: "記憶體管理 → OOM / Swap；檔案系統 → 跨平台路徑；行程排程 → Process / Thread / GIL"
    needs_real_image: false

  - index: 13
    prototype: RISK
    thesis: "OOM 與 Swap 不是抽象概念——它們是你程式當機的直接原因。"
    data_hook: "三種常見 OOM：一次讀大檔、groupby 爆 pivot、DataFrame copy 鏈；Swap 啟動後效能掉 100-1000 倍"
    needs_real_image: false

  - index: 14
    prototype: MATRIX
    thesis: "檔案系統跨平台的小坑：Windows `\\` vs Unix `/`——這就是為什麼要用 pathlib 而不是字串拼接。"
    data_hook: "os.sep / os.path.join / pathlib.Path；Windows \\\\ vs POSIX /；檔名大小寫敏感性差異"
    needs_real_image: false

  - index: 15
    prototype: VS
    thesis: "I/O Bound vs CPU Bound：瓶頸在等待還是在計算，決定了你該用 async、multithread 還是 multiprocess。"
    data_hook: "I/O Bound：爬蟲/讀檔/資料庫 → async/thread；CPU Bound：特徵工程/矩陣 → multiprocess/向量化"
    needs_real_image: false

  - index: 16
    prototype: FLOW
    thesis: "`df = pd.read_csv('data.csv')` 的一生：從一行 Python 到 OS、到硬碟、再回到 RAM 的完整旅程。"
    data_hook: "Python 直譯 → Bytecode → System Call → 檔案系統 → I/O → RAM → CPU 運算"
    needs_real_image: false

  - index: 17
    prototype: SILENT
    thesis: "讀懂這張地圖後，後面每一章的效能章節，都只是在這張地圖上標註座標。"
    data_hook: null
    needs_real_image: false
