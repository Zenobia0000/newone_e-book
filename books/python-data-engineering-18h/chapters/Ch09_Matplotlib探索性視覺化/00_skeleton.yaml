# Ch09 skeleton — SOP §4.1
# Matplotlib 探索性視覺化（M4 視覺化與整合實戰 · 1.5 hr）

chapter: Ch09
title: Matplotlib 探索性視覺化
module: M4 視覺化與整合實戰
time_min: 90
n_content: 17
governing_thought: >
  圖不是漂亮，是問題的顯影 ——
  選對四種 EDA 圖（折線 / 散佈 / 直方 / Box），
  用 Figure/Axes 雙層結構 + subplots，
  讓資料自己開口說話。

arc:
  - phase: 開場（SILENT / ASK）
    slides: [S1, S2]
    intent: 從「會畫圖」推到「圖是為了回答問題」。
  - phase: 9-1 Figure / Axes 雙層結構
    slides: [S3, S4, S5, S6]
    intent: 立穩心智模型 — 狀態式 vs 物件導向，為何推薦 OO。
  - phase: 9-2 EDA 必備四種圖
    slides: [S7, S8, S9, S10, S11, S12]
    intent: 一圖一問題 — 趨勢／關係／分布／離群，每張配真實範例。
  - phase: 9-3 客製化：標題／軸／圖例／配色／中文／存檔
    slides: [S13, S14]
    intent: 把原型圖打磨成可交付成品。
  - phase: 9-4 subplots 多圖排版
    slides: [S15, S16]
    intent: 2×2 一次看四張 — EDA 工作流的儀表板。
  - phase: 收束
    slides: [S17]
    intent: 四圖速查 + 預告 Ch10 把清洗 + 視覺化封裝進 DataCleaner。

slides:
  - id: S1
    type: SILENT
    thesis: "圖不是漂亮，\n是問題的顯影。"
  - id: S2
    type: ASK
    question: "為什麼大家 plot 完\n還要查文件半小時？"
    data_card:
      label: Matplotlib 官方 Cheatsheet 下載量（2024）
      stat: 4 M+
      caption: 「用過就忘」是 Matplotlib 的常態 — 因為大家背 API，沒建心智模型
  - id: S3
    type: MATRIX-2x2
    title: "EDA 要回答的四個問題 → 四種必備圖"
  - id: S4
    type: IMAGE
    title: "Figure / Axes 雙層結構：畫布 + 座標系"
    image_id: Ch09_S04_figure_axes_structure
  - id: S5
    type: VS-CODE
    title: "狀態式 pyplot vs 物件導向 OO：為何業界推薦 OO"
  - id: S6
    type: CODE
    title: "fig, ax = plt.subplots()：所有圖的共同骨架"
  - id: S7
    type: SILENT
    thesis: "選對圖，\n資料就會自己說故事。"
  - id: S8
    type: IMAGE-CODE
    title: "折線圖 ax.plot：趨勢與時間序列"
    image_id: Ch09_S08_lineplot_sample
  - id: S9
    type: IMAGE-CODE
    title: "散佈圖 ax.scatter：兩變數關係與離群偵測"
    image_id: Ch09_S09_scatter_sample
  - id: S10
    type: IMAGE-CODE
    title: "直方圖 ax.hist：單變數分布的第一眼"
    image_id: Ch09_S10_hist_sample
  - id: S11
    type: IMAGE-CODE
    title: "Box plot ax.boxplot：分組比較與四分位數"
    image_id: Ch09_S11_box_sample
  - id: S12
    type: TABLE
    title: "四圖速查表：何時選誰、常見誤用、解讀重點"
  - id: S13
    type: CODE
    title: "客製化三件套：標題／軸線／圖例／配色"
  - id: S14
    type: CODE
    title: "中文字型 + savefig：把圖變成可交付成品"
  - id: S15
    type: IMAGE-CODE
    title: "subplots(2, 2)：一次看四張，EDA 儀表板"
    image_id: Ch09_S15_subplots_2x2
  - id: S16
    type: FLOW
    title: "EDA 四圖工作流：分布 → 趨勢 → 相關 → 離群"
  - id: S17
    type: PYRAMID
    title: "Ch09 收束：四圖 + OO 心智模型"

image_placeholders:
  - id: Ch09_S04_figure_axes_structure
    slot_name: Figure / Axes 雙層結構圖
    description: 外層大框 Figure，內層一至多個 Axes（座標系）；標註 spines / ticks / legend / title 歸屬
    recommended_size: 1400×900 px
  - id: Ch09_S08_lineplot_sample
    slot_name: 折線圖範例（月度銷售趨勢）
    description: 深綠折線 + 灰色網格，x 軸月份、y 軸金額；標題「2024 月度銷售」
    recommended_size: 1200×720 px
  - id: Ch09_S09_scatter_sample
    slot_name: 散佈圖範例（身高 vs 體重）
    description: 深綠點 + 灰色網格，明顯 1 個離群點；x 軸身高、y 軸體重
    recommended_size: 1200×720 px
  - id: Ch09_S10_hist_sample
    slot_name: 直方圖範例（考試成績分布）
    description: 深綠柱體 + 灰邊，bins=20，右偏分布；x 軸分數、y 軸次數
    recommended_size: 1200×720 px
  - id: Ch09_S11_box_sample
    slot_name: Box plot 範例（三城市房價）
    description: 三個並排 box plot，標註中位數、IQR、離群點；y 軸單位「百萬」
    recommended_size: 1200×720 px
  - id: Ch09_S15_subplots_2x2
    slot_name: subplots 2×2 EDA 儀表板
    description: 2×2 一頁四圖：直方（分布）、折線（趨勢）、散佈（相關）、box（離群）；統一主色
    recommended_size: 1600×1000 px
