    data_card:
      label: 1e8 筆 float64 加總實測
      stat: 80×
      caption: Python list comprehension vs np.sum 的平均時間比
  - id: S3
    type: MATRIX-2x3
    title: "為什麼 list 不夠用：ndarray 的六個差別"
  - id: S4
    type: CODE
    title: "ndarray 三件套：shape / dtype / ndim"
  - id: S5
    type: IMAGE-CODE
    title: "連續記憶體：ndarray 跑得快的物理原因"
    image_id: Ch07_S05_memory_layout
  - id: S6
    type: CODE
    title: "建立 ndarray 的六種常用方式"
  - id: S7
    type: CODE
    title: "多維切片：arr[行, 列] 的心智模型"
  - id: S8
    type: CODE
    title: "布林索引：用條件過濾資料"
  - id: S9
