image_placeholders:
  - id: Ch07_S05_memory_layout
    slot_name: ndarray 連續記憶體佈局
    description: 左側畫 Python list（散落 box + pointer 指向各處的 PyObject）；右側畫 ndarray（一塊連續記憶體格子、同型別、CPU cache line 覆蓋整塊）。
    recommended_size: 1400×800 px
  - id: Ch07_S12_broadcasting_rule
    slot_name: Broadcasting 三步規則示意
    description: 兩個 shape（例 (2,1) 與 (3,)）右對齊、缺維補 1、大小 1 沿該軸拉伸為 (2,3)，用箭頭標註三個步驟。
    recommended_size: 1400×700 px
  - id: Ch07_S17_axis_diagram
    slot_name: axis 方向圖
    description: 一個 3×4 矩陣，上方箭頭由下往上穿過每一欄（axis=0 沿列方向 → 每欄聚合），右方箭頭由左往右穿過每一列（axis=1 沿欄方向 → 每列聚合）。
    recommended_size: 1200×900 px
