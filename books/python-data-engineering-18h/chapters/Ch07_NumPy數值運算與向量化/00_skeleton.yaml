# Ch07 skeleton — SOP §4.1
# NumPy 數值運算與向量化（M3 數據工程核心 · 2.0 hr）

chapter: Ch07
title: NumPy 數值運算與向量化
module: M3 數據工程核心
time_min: 120
n_content: 19
governing_thought: >
  NumPy 不是讓你算快一點的工具，
  而是讓你用 shape × broadcasting 的語言描述計算問題 ——
  從「我寫個 for 迴圈」直接跳到「向量化思維」的分水嶺。

arc:
  - phase: 開場（SILENT/ASK）
    slides: [S1, S2]
    intent: 把「寫 for 迴圈算數字」的輕率，推到「資料工程語言換檔」的重量。
  - phase: ndarray 的本質
    slides: [S3, S4, S5, S6]
    intent: shape / dtype / ndim 三件套；連續記憶體 + 單一型別，呼應 Ch1 CPU/RAM。
  - phase: 索引與切片
    slides: [S7, S8, S9, S10]
    intent: 一維/多維切片、布林索引、Fancy Indexing；view vs copy 的陷阱。
  - phase: Broadcasting
    slides: [S11, S12, S13, S14]
    intent: 從規則到經典範例，一直到 z-score 標準化。
  - phase: 向量化效能 + axis 心智模型
    slides: [S15, S16, S17, S18]
    intent: for vs NumPy 的效能差距（呼應 Ch1 C/SIMD）、統計函式、axis 方向圖。
  - phase: 收束
    slides: [S19]
    intent: shape / dtype / broadcasting / axis 四件套 + 預告 Ch08 Pandas 底層就是 ndarray。

