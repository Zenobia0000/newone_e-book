module: Ch03
title: "自訂函式與特殊 Python 函式"
governing_thought: "Lambda / map / filter / Comprehension 不是炫技糖衣，是為 Pandas apply 鋪跑道。學會把 3 行 for 寫成 1 行聲明式表達式，日後欄位轉換就能少寫 80% 樣板程式。"
