module: Ch02
title: "資料處理分析與隱私安全"
track: exam-prep
governing_thought: "資料是 AI 的燃料——考試考的是你懂不懂資料從哪來、怎麼清、怎麼保護。"
target_time_minutes: 90
exam_map:
  - code: "初級L112"
    topics: ["資料基本概念與來源", "資料整理與分析流程", "資料隱私與安全"]
audience: "準備報考 iPAS AI 應用規劃師初級的考生"
style: "Exam-prep-strict (備考版 v1.0)"
primary_color: "#0D1B2A"
accent_color: "#00D4AA"
warning_color: "#FF6B35"

learning_objectives:
  - LO1: "說明大數據的 5V 特性（Volume/Velocity/Variety/Veracity/Value）並辨識考題中的配對"
  - LO2: "區分結構化/半結構化/非結構化資料，並判斷常見資料來源的型態"
  - LO3: "描述完整的資料處理流程（收集→清理→轉換→分析→呈現），識別各階段的關鍵操作"
  - LO4: "解釋特徵工程的核心操作（選取/建立/轉換/標準化），理解其對模型的影響"
  - LO5: "說明資料標準化與正規化的差異與使用時機"
  - LO6: "理解個資法核心概念、去識別化技術、資料安全三原則（機密性/完整性/可用性），在情境題中正確判斷"

common_pitfalls:
  - P1: "把 5V 的 Veracity（真實性）和 Value（價值）搞混——Veracity 是資料品質，Value 是商業價值"
  - P2: "JSON/XML 歸類為結構化資料——它們是半結構化，不是結構化"
  - P3: "以為資料清理只是刪除缺失值——清理還包含異常值處理、格式統一、重複值移除"
  - P4: "標準化和正規化分不清——標準化是 Z-score（均值0標準差1），正規化是 Min-Max（縮放到0-1）"
  - P5: "以為匿名化等於去識別化——匿名化是不可逆的，去識別化可能是可逆的（假名化）"

bridge_to_next:
  - "Ch03 機器學習 ← 本章的資料處理流程是 ML 建模的前置步驟"
  - "Ch04 生成式 AI ← 本章的資料概念直接影響 RAG 的資料準備"
  - "Ch01 AI 概念 ← 本章的資料隱私呼應 Ch01 的 AI 治理原則"

