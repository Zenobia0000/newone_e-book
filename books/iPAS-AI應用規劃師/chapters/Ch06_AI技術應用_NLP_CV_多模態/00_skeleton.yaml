module: Ch06
title: AI技術應用——NLP、CV、多模態
track: exam-prep
governing_thought: "中級科目一的核心：你能否在 NLP、CV、GenAI、多模態之間選對技術。"
exam_map: 中級L211（NLP技術 / CV技術 / 生成式AI技術 / 多模態AI）
target_time_minutes: 120
n_content: 22
archetype_mix:
  SILENT: 3
  ASK: 1
  MATRIX: 3
  VS: 2
  MECHANISM_FLOW: 3
  PITFALL: 2
  TABLE: 3
  PYRAMID: 1
  PRACTICE_PROMPT: 1
  EXAM_DRILL: 3

learning_objectives:
  - id: LO1
    text: 說明 NLP 核心技術（Tokenization / Word2Vec / TF-IDF / NER / 情緒分析）的原理與適用場景
  - id: LO2
    text: 區分 CV 四大任務（圖像分類 / 物件偵測 / 語義分割 / 實例分割）的輸入輸出與技術差異
  - id: LO3
    text: 解釋 Transformer 架構的核心機制（Self-Attention / 位置編碼），及其在生成式 AI 中的角色
  - id: LO4
    text: 比較模型壓縮技術（蒸餾 / 剪枝 / 量化）的原理與取捨
  - id: LO5
    text: 辨識多模態 AI 三種融合策略（早期融合 / 晚期融合 / 注意力機制融合）的差異與適用情境
  - id: LO6
    text: 掌握業界趨勢（AutoML）的基本概念與考試出題方向

common_pitfalls:
  - id: P1
    text: 混淆 Word2Vec 與 TF-IDF——前者是稠密向量（語義），後者是稀疏權重（詞頻重要度）
  - id: P2
    text: 搞混語義分割與實例分割——語義不分個體，實例分個體
  - id: P3
    text: 以為 Transformer 只用在 NLP，忽略其在 CV（ViT）和多模態的廣泛應用
  - id: P4
    text: 量化與剪枝搞反——量化降精度（FP32→INT8），剪枝移除不重要的連接
  - id: P5
    text: 早期融合與晚期融合選反——早期在特徵層合併，晚期在決策層合併

bridge_to_next:
  text: "Ch06 建立了 NLP/CV/GenAI/多模態的技術辨識力，Ch07 進入 AI 導入規劃與系統部署——把技術選擇落地為工程實踐。"

