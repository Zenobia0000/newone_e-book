module: Ch05
title: 生成式AI導入評估與風險管理
track: exam-prep
governing_thought: "導入 AI 不是裝一個工具，是做一個決策——考試考的是你的規劃判斷力。"
exam_map: 初級L123（導入評估 / 導入規劃 / 風險管理）
target_time_minutes: 120
n_content: 20
archetype_mix:
  SILENT: 3
  ASK: 1
  MATRIX: 3
  VS: 2
  MECHANISM_FLOW: 2
  PITFALL: 2
  TABLE: 3
  PYRAMID: 1
  PRACTICE_PROMPT: 1
  EXAM_DRILL: 2

learning_objectives:
  - id: LO1
    text: 運用技術工具模型效能評估框架，判斷 AI 方案是否適用於指定場景
  - id: LO2
    text: 根據成本效益分析（ROI / TCO）選擇適用的 AI 解決方案
  - id: LO3
    text: 說明經濟部《AI導入指引》的核心流程與關鍵步驟
  - id: LO4
    text: 區分目標設置、資源分配、導入策略、因應措施、測試五大規劃面向
  - id: LO5
    text: 辨識 GenAI 倫理風險、資料安全隱私、合規性三大風險維度及其影響
  - id: LO6
    text: 設計 AI Agent 導入的風險評估與緩解策略

common_pitfalls:
  - id: P1
    text: 把「導入評估」混淆為純技術評估，忽略組織面與成本面
  - id: P2
    text: 不清楚經濟部《AI導入指引》的分階段流程，考題直接失分
  - id: P3
    text: 將「風險管理」窄化為資安問題，忽略倫理、合規、社會影響
  - id: P4
    text: 搞混 AI Agent 與傳統 AI 工具的差異，無法回答代理相關考題
  - id: P5
    text: 成本效益分析只算硬體成本，漏算人力、維運、資料標註等隱性成本

bridge_to_next:
  text: "Ch05 講完導入的『決策判斷』，Ch06 進入中級科目一——NLP/CV/多模態的技術選擇，從規劃力升級到技術辨識力。"

