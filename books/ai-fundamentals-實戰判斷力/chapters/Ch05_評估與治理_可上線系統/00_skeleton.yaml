module: Ch05
title: 評估與治理——可上線系統
governing_thought: "AI 系統不是能跑就好，而是能不能被信任。"
target_time_minutes: 120
n_content: 20
archetype_mix:
  SILENT: 3
  ASK: 1
  MATRIX: 3
  VS: 2
  MECHANISM_FLOW: 2
  PITFALL: 2
  TABLE: 3
  PYRAMID: 1
  PRACTICE_PROMPT: 1
  CODE: 2

learning_objectives:
  - id: LO1
    text: 區分 offline/online × human/auto 四象限評估，選出適合任務的 eval 策略
  - id: LO2
    text: 建立結構化測試集（dataset versioning），擺脫「靠感覺驗收」
  - id: LO3
    text: 運用 failure taxonomy 五類（資料錯、retrieval 錯、推理錯、工具錯、格式錯）快速定位問題根因
  - id: LO4
    text: 列出上線前 checklist，包含 safety policy、rollback/fallback、observability
  - id: LO5
    text: 辨識 AI 治理最小集：hallucination、privacy、copyright、prompt injection
  - id: LO6
    text: 設計 KPI 組合（成功率、延遲、成本、使用者滿意度、風險事件率）與小規模試點流程

common_pitfalls:
  - id: P1
    text: 只做 offline eval 就上線，沒有 online eval 持續監控
  - id: P2
    text: 測試集太小或不版控，eval 結果不可重現
  - id: P3
    text: 出錯只說「AI 不準」，沒做 failure taxonomy 分類
  - id: P4
    text: 沒有 rollback 機制，出事只能全線停機
  - id: P5
    text: 忽略 prompt injection，上線即暴露系統 prompt

bridge_to_next:
  text: "六章課程收尾——從 Ch00 選武器到 Ch05 確保可上線，AI 專案生命週期完整走一遍。下一步：選一個真實場景，從問題定義到 eval 跑一輪。"

