module: F1
title: "計算機概論與 OS 角色"
track: teaching
governing_thought: "資料處理的瓶頸永遠在硬體——RAM 有多大、資料在哪一層跑，決定你的程式會不會卡。"
target_time_minutes: 90
audience: "僅有 Python 基礎的非理工資訊背景學生（商管、人文、行銷、行政、設計、醫護等轉職或自學者）"
style: Teaching-strict (完整版 v1.1)
primary_color: "#1B5E3F"
warning_color: "#C62828"
success_color: "#2E7D32"

learning_objectives:
  - LO1: "用生活化類比說出 CPU / RAM / Storage 的分工（廚房三角色）"
  - LO2: "用 Bit/Byte 量級估算『1 億筆 float64』會吃多少 RAM"
  - LO3: "說明為何『I/O 比計算慢 100 倍』——解釋讀檔卡住的根因"
  - LO4: "說明 OS 三大職責（記憶體 / 檔案 / 行程）與 Python 的關係"
  - LO5: "區分 I/O Bound 與 CPU Bound 任務，選對後續優化策略"
  - LO6: "用 pathlib 取代字串拼路徑，避免 Windows/Linux 跨平台 bug"

common_pitfalls:
  - P1: "一口氣 pd.read_csv() 讀 5GB 檔案 → OOM（應該用 chunksize 或 dtype 降記憶體）— 銜接 S2"
  - P2: "用字串 '\\\\' 拼路徑，上雲端 Linux 就爆炸（應該 pathlib.Path）— 銜接 S2"
  - P3: "對 I/O Bound 任務用 multiprocessing（應該 async / threading）"
  - P4: "以為 RAM 沒滿就安全，忽略 Swap 觸發後系統會卡死"
  - P5: "以為 Python 慢就是『Python 爛』——其實是運算在 Python 層沒交給 C 層（銜接 S1 向量化）"

bridge_to_next:
  - "S1 向量化 ← 來自本章『I/O 很慢 + 運算要交給 C 層』的觀念"
  - "S2 read_csv + pathlib ← 來自本章 P1 OOM + P2 路徑字串"
  - "S4 大資料 EDA ← 來自本章 RAM 工作檯的量級感"
  - "F2 Python 資料結構 ← 本章結尾的預告"

narrative_arc:
  hook: [1, 2]
  tension: [3]
  reveal: [4, 5, 7, 9, 11, 12, 15]
  ground: [10, 13, 14, 16, 17]
  feel: [19, 20, 21]
  checkpoint: [6, 8, 18]
  pitfall_cluster: [10, 13, 17]
  practice: [14, 16]

slides:
  - index: 1
    prototype: MOTIVATION
    learning_objective: "建立動機：用非理工生活場景連結到『電腦為何卡』"
    thesis: "你打開 5 萬筆訂單的 Excel，電腦卡 3 分鐘——不是你電腦爛，是記憶體在抗議。"
    data_hook: "行銷主管 / 財務 / 行政每月都遇到的場景：Excel 凍結轉圈圈"
    needs_real_image: false

  - index: 2
    prototype: ASK
    learning_objective: "引出問題：同樣一行 read_csv()，為什麼有時秒回、有時凍結"
    thesis: "同一行程式、同一份資料——差別在『電腦還剩多少 RAM』。"
    data_hook: "8GB RAM 機器 · 讀 500MB CSV → 0.8s；讀 5GB CSV → OOM"
    needs_real_image: false

  - index: 3
    prototype: SILENT
    learning_objective: "立論：資料處理的瓶頸永遠在硬體"
    thesis: "寫得快的程式，是懂硬體的人寫的。\n不是語法炫的人寫的。"
    needs_real_image: false

  - index: 4
    prototype: CONCEPT-CARD
    learning_objective: "LO1 — 三角色類比：廚師 / 工作檯 / 倉庫"
    thesis: "CPU 是廚師、RAM 是工作檯、Storage 是倉庫——料不搬到工作檯，廚師碰不到。"
    data_hook: "左：三層分工類比；右：廚房視覺示意圖（需真圖）"
    needs_real_image: true

  - index: 5
    prototype: EXAMPLE-I/O
    learning_objective: "LO4 — 一行 pd.read_csv() 背後走了幾層"
    thesis: "Python 碼 → OS System Call → 檔案系統 → I/O 控制器 → RAM → CPU"
    data_hook: "你寫一行，OS 幫你跑七步"
    needs_real_image: false

  - index: 6
    prototype: CHECKPOINT
    learning_objective: "LO1 — 廚房角色連連看（鞏固類比）"
    thesis: "不看投影片，把三個角色配回電腦三件硬體。"
    needs_real_image: false

  - index: 7
    prototype: CONCEPT-CARD
    learning_objective: "LO2 — Bit/Byte/KB/MB/GB/TB 量級感"
    thesis: "1 Byte = 8 Bit；一個 float64 = 8 Bytes；生活對照一眼看懂。"
    data_hook: "左：單位階梯；右：一張照片/一首歌/一部片各多大"
    needs_real_image: false

  - index: 8
    prototype: CHECKPOINT
    learning_objective: "LO2 — 量級估算快問：RAM 能裝多少筆資料"
    thesis: "三題 30 秒估算：1 億筆 float64 多大？1000 萬列 × 50 欄呢？float32 省幾成？"
    needs_real_image: false

  - index: 9
    prototype: CONCEPT-CARD
    learning_objective: "LO1 LO2 — RAM 是工作檯：資料必須『先載入才能算』"
    thesis: "CPU 看不到 Storage——所有運算都在 RAM 上發生。Storage 慢 RAM 約 1000 倍。"
    data_hook: "為什麼 Pandas 一讀就爆：整個檔案要先塞進 RAM"
    needs_real_image: false

  - index: 10
    prototype: PITFALL
    learning_objective: "P1 — OOM：一口氣讀 5GB CSV（→ 銜接 S2 chunksize）"
    thesis: "pd.read_csv('big.csv') 整檔塞 RAM vs chunksize 分批串流"
    data_hook: "錯：MemoryError · 對：for chunk in pd.read_csv(..., chunksize=100_000)"
    needs_real_image: false

  - index: 11
    prototype: CONCEPT-CARD
    learning_objective: "LO3 — 為什麼 I/O 慢：讀檔 vs 計算的速度差 100 倍"
    thesis: "CPU 一秒跑幾十億次運算；SSD 一秒只能讀幾萬次檔案——差距 100-1000 倍。"
    data_hook: "生活類比：廚師切菜 1 秒 vs 倉庫叫貨 5 分鐘（比例一樣）"
    needs_real_image: false

  - index: 12
    prototype: MECHANISM-FLOW
    learning_objective: "LO4 — OS 三大職責：記憶體 / 檔案 / 行程"
    thesis: "你的 Python 程式碰不到硬體——全部透過 OS 代理。"
    data_hook: "三節點：記憶體管理（OOM/Swap）→ 檔案系統（路徑）→ 行程排程（GIL 前導）"
    needs_real_image: false

  - index: 13
    prototype: PITFALL
    learning_objective: "P2 LO6 — 路徑跨平台：反斜線字串 vs pathlib（→ 銜接 S2）"
    thesis: "'data\\\\2024\\\\sales.csv' 在 Linux 就壞掉；pathlib.Path 永遠對。"
    data_hook: "錯：open('data\\\\x.csv') · 對：Path('data') / '2024' / 'x.csv'"
    needs_real_image: false

  - index: 14
    prototype: PRACTICE-PROMPT
    learning_objective: "LO2 — 實地動手：估算你自己的筆電能讀多大的 CSV"
    thesis: "用兩個數字（你的 RAM + 每列欄數），一分鐘算出安全檔案大小上限。"
    needs_real_image: false

  - index: 15
    prototype: CONCEPT-CARD
    learning_objective: "LO5 — I/O Bound vs CPU Bound"
    thesis: "瓶頸在『等』是 I/O Bound；瓶頸在『算』是 CPU Bound——策略完全不同。"
    data_hook: "左：爬蟲/讀檔 → async/threading · 右：矩陣運算/特徵工程 → 向量化/multiprocessing"
    needs_real_image: false

  - index: 16
    prototype: PRACTICE-PROMPT
    learning_objective: "LO5 — 判斷三個任務是哪種 Bound"
    thesis: "2 分鐘判斷：爬 1000 個 URL / 10 億筆加總 / read_csv 5GB——各該用什麼策略？"
    needs_real_image: false

  - index: 17
    prototype: PITFALL
    learning_objective: "P3 — 用錯武器：I/O Bound 上 multiprocessing 白工"
    thesis: "爬 1000 個網頁開 8 個行程 → 跟開 1 個一樣慢；要用 async/threading。"
    data_hook: "錯：ProcessPool(8) · 對：asyncio.gather 或 ThreadPool"
    needs_real_image: false

  - index: 18
    prototype: CHECKPOINT
    learning_objective: "三核心 take-away 回顧測驗"
    thesis: "離開教室前，用自己的話回答三件事：RAM 角色 / I/O 為什麼慢 / 路徑怎麼寫"
    needs_real_image: false

  - index: 19
    prototype: CONCEPT-CARD
    learning_objective: "三個要帶走的反射（全課核心）"
    thesis: "RAM 是工作檯 / I/O 很慢 / 路徑用斜線——這三件事會出現在後面每一章。"
    data_hook: "每件事配一個後續章節的箭頭（→ S1 / → S2 / → S4）"
    needs_real_image: false

  - index: 20
    prototype: PYRAMID
    learning_objective: "收束：硬體 → OS → Python 的全景"
    thesis: "懂硬體 → 懂 OS → 才寫得動 Python 資料處理。"
    needs_real_image: false

  - index: 21
    prototype: MOTIVATION
    learning_objective: "銜接 F2：為什麼要學 Python 資料結構"
    thesis: "RAM 省一半的秘訣不在硬體——在你選哪個資料結構。下一章 F2 回到 Python。"
    data_hook: "list vs tuple vs dict vs generator 的記憶體差異預告"
    needs_real_image: false
