  - id: S3_S05_split_apply_combine
    slot_name: "Split-Apply-Combine 流程圖"
    slide_no: 5
    archetype: MECHANISM-FLOW
    description: |
      一張左→右橫向流程圖，三段：
      (1) Split  — 完整 orders DataFrame，標註被依 region 切成「北區 / 中區 / 南區」三組
      (2) Apply  — 每組對 amount 欄位做 sum（每組結果是一個純量）
      (3) Combine — 拼回單一結果表：region | amount_sum（3 rows）
      顏色用主色 #1B5E3F；每段之間用粗箭頭連接。
